<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokmål CEFR PWA - Lær Norsk</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002f6c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #f4f6f9; --card: #ffffff; --primary: #002f6c; --accent: #ba0c2f; --success: #2e7d32; --secondary: #4a5568; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 500px; }
        h1 { font-size: 1.4rem; color: var(--primary); text-align: center; margin: 5px 0; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #e2e8f0; color: var(--secondary); transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .menu-box { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        select, input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 0.9rem; }
        .file-label { display: block; font-size: 0.8rem; font-weight: bold; color: #555; margin-top: 5px; }
        
        .stats { display: flex; justify-content: space-between; font-size: 0.85rem; color: #666; margin-bottom: 5px; font-weight: 500; }
        .bar { background: #e0e0e0; border-radius: 10px; height: 10px; width: 100%; margin-bottom: 20px; overflow: hidden; }
        .fill { background: var(--success); height: 100%; width: 0%; transition: width 0.3s; }
        
        .card { background: var(--card); border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.06); padding: 30px 20px; min-height: 260px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; cursor: pointer; position: relative; margin-bottom: 20px; text-align: center; box-sizing: border-box;}
        .nor { font-size: 2rem; font-weight: 800; color: var(--primary); margin: 10px 0 2px 0; word-break: break-word; }
        .pron { font-size: 0.95rem; color: #777; font-style: italic; margin-bottom: 15px; }
        .context-tag { background: #e2e8f0; color: var(--secondary); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .audio-btn { background: #e0e6ed; border: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        
        .divider { width: 100%; border-top: 1px dashed #ddd; margin: 10px 0; display: none; }
        .translation-block { display: none; width: 100%; }
        .eng { font-size: 1.25rem; color: #333; font-weight: bold; margin-bottom: 15px; }
        .sentence-box { background: #f8f9fa; padding: 12px; border-radius: 8px; text-align: left; border-left: 4px solid var(--primary); margin-top: 5px; }
        .s-nor { font-size: 1rem; font-weight: 600; color: #222; margin-bottom: 4px; }
        .s-eng { font-size: 0.9rem; color: #666; }
        .muntlig-tip { margin-top: 10px; font-size: 0.85rem; color: var(--accent); background: #fff5f5; padding: 8px; border-radius: 6px; border: 1px solid #fed7d7; font-weight: 500; text-align: left; }
        
        .hint { font-size: 0.75rem; color: #bbb; font-weight: bold; letter-spacing: 0.5px; margin-top: 10px; }
        .actions { display: flex; gap: 12px; }
        button.action-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button.action-btn:active { transform: scale(0.97); }
        .btn-fail { background: #ffebee; color: var(--accent); border: 2px solid var(--accent); }
        .btn-pass { background: #e8f5e9; color: var(--success); border: 2px solid var(--success); }
        .debug-msg { font-size: 0.75rem; color: #999; text-align: center; margin-top: 15px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>🇳🇴 Bokmål CEFR Progress</h1>
    
    <div class="tabs">
        <button id="tabGloser" class="tab-btn active" onclick="switchMode('gloser')">📖 Gloser & Ord</button>
        <button id="tabMuntlig" class="tab-btn" onclick="switchMode('muntlig')">🗣️ Muntlig & Reise</button>
    </div>
    
    <div class="menu-box">
        <label class="file-label">👤 USER ID:</label>
        <input type="text" id="userIdInput" value="learner_1" onchange="switchUser()">
        
        <label class="file-label" style="margin-top:10px;">🎯 CEFR-NIVÅ:</label>
        <select id="levelPicker" onchange="switchLevel()">
            <option value="A1">A1: Nybegynner (Introduksjon)</option>
            <option value="A2">A2: Elementært (Hverdagsliv & Leilighet)</option>
            <option value="B1">B1: Selvstendig (Samfunn & Diskusjon)</option>
            <option value="B2">B2: Avansert (Arbeid & Bærekraft)</option>
        </select>
    </div>

    <div class="stats">
        <span id="statProgress">Mestret: 0/0</span>
        <span id="statPercent">0%</span>
    </div>
    <div class="bar"><div class="fill" id="barFill"></div></div>

    <div class="card" onclick="flip(event)">
        <div style="width:100%;">
            <span class="context-tag" id="boxTag">Vokabular</span>
            <div class="nor" id="boxNor">Laster...</div>
            <div class="pron" id="boxPron">-</div>
            <button class="audio-btn" onclick="speakCurrentWord(event)">🔊 Lytt</button>
        </div>
        <div class="divider" id="boxDivider"></div>
        <div class="translation-block" id="boxTranslation">
            <div class="eng" id="boxEng">-</div>
            <div class="sentence-box">
                <div class="s-nor" id="boxSNor">-</div>
                <div class="s-eng" id="boxSEng">-</div>
            </div>
            <div class="muntlig-tip hidden" id="boxMuntligTip"></div>
        </div>
        <div class="hint" id="boxHint">TRYKK PÅ KORTET FOR Å SE SVAR</div>
    </div>

    <div class="actions">
        <button class="action-btn btn-fail" onclick="handleCard(false)">❌ Repetere</button>
        <button class="action-btn btn-pass" onclick="handleCard(true)">✅ Kan det</button>
    </div>
    
    <div class="debug-msg" id="dbMsg">Initialiserer...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Fallback safe initialization
    let db = null;
    try {
        if(firebaseConfig.apiKey !== "YOUR_API_KEY") {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        }
    } catch(e) { console.error("Firebase init failed, using local storage", e); }

    // Broad structured learning database targeting Vocab, Storyline & Oral Tasks
    const masterData = {
        "gloser": {
            "A1": [
                { no: "å hilse", pron: "[å heel-seh]", en: "to greet", s_no: "Det er viktig å hilse på naboen.", s_en: "It is important to greet the neighbor.", tag: "Sosialt" },
                { no: "en familie", pron: "[ehn fah-mee-lee-eh]", en: "a family", s_no: "Min familie bor i utlandet.", s_en: "My family lives abroad.", tag: "Relasjoner" }
            ],
            "A2": [
                { no: "en leilighet", pron: "[ehn lye-lee-heht]", en: "an apartment", s_no: "Jeg leter etter en leilighet med god planløsning.", s_en: "I am looking for an apartment with a good layout.", tag: "Bolig" },
                { no: "å trives", pron: "[å tree-vehs]", en: "to thrive / enjoy oneself", s_no: "Jeg trives veldig godt i Norge.", s_en: "I thrive very well in Norway.", tag: "Følelser" }
            ],
            "B1": [
                { no: "en undersøkelse", pron: "[ehn oon-dehr-sooh-kehls-eh]", en: "a survey / investigation", s_no: "Undersøkelsen viser at mange lærer norsk på nett.", s_en: "The survey shows that many learn Norwegian online.", tag: "Samfunn" },
                { no: "å uttrykke", pron: "[å oot-tryk-keh]", en: "to express", s_no: "Det kan være vanskelig å uttrykke følelser på et nytt språk.", s_en: "It can be difficult to express feelings in a new language.", tag: "Kommunikasjon" }
            ],
            "B2": [
                { no: "bærekraftig", pron: "[baere-krahf-tee]", en: "sustainable", s_no: "Vi må finne bærekraftige løsninger for fremtiden.", s_en: "We must find sustainable solutions for the future.", tag: "Miljø" },
                { no: "en forutsetning", pron: "[ehn fohr-oot-seht-neeng]", en: "a prerequisite / condition", s_no: "Gode språkkunnskaper er en forutsetning for denne stillingen.", s_en: "Good language skills are a prerequisite for this position.", tag: "Arbeidsliv" }
            ]
        },
        "muntlig": {
            "A1": [
                { no: "Hva heter du og hvor bor du?", pron: "Presentasjon", en: "Introduce yourself", s_no: "Jeg heter Ashutosh. Jeg kommer fra India, men jeg har bodd i Norge i nesten seks år.", s_en: "My name is Ashutosh. I come from India, but I have lived in Norway for nearly six years.", tag: "Muntlig: Dele 1", tip: "Muntlig-tips: Hold det enkelt, men snakk klart og tydelig om deg selv." }
            ],
            "A2": [
                { no: "Fortell om boligen din eller et sted du har besøkt.", pron: "Beskrivelse", en: "Describe your home or a place visited", s_no: "Jeg bor i en fin leilighet. I ferien reiste jeg til Split i Kroatia, hvor jeg så på historiske festninger.", s_en: "I live in a nice apartment. During the holidays I traveled to Split in Croatia, where I looked at historic fortresses.", tag: "Muntlig: Dele 2", tip: "Muntlig-tips: Bruk preteritum (fortid) riktig når du forteller om en reise eller opplevelse." }
            ],
            "B1": [
                { no: "Bør foreldre bestemme over barnas skjermtid?", pron: "Argumentasjon", en: "Expressing opinions on screen time", s_no: "Etter min mening er det viktig at voksne setter grenser, men barna må også lære digital dømmekraft.", s_en: "In my opinion, it is important that adults set limits, but children must also learn digital judgment.", tag: "Muntlig: Individuell oppgave", tip: "Muntlig-tips: Bruk faste uttrykk som 'Etter min mening...', 'Jeg mener at...' for å strukturere argumentene dine." }
            ],
            "B2": [
                { no: "Hvordan kan Norge balansere oljeproduksjon og klimatiltak?", pron: "Drøfting", en: "Discussing oil economy vs climate solutions", s_no: "Dette er et komplekst spørsmål. På den ene siden sikrer oljen arbeidsplasser; på den andre siden krever det grønne skiftet en rask omstilling.", s_en: "This is a complex issue. On one hand, oil secures jobs; on the other hand, the green shift requires a rapid transition.", tag: "Muntlig: Drøfting", tip: "Muntlig-tips: Vis nyanser ved å bruke 'På den ene siden... på den andre siden...' og vis variert ordforråd." }
            ]
        }
    };

    let currentMode = "gloser"; // 'gloser' eller 'muntlig'
    let activeLevel = "A1";
    let sessionList = [];
    let masteredList = [];
    let idx = 0;
    let flipped = false;
    let userId = "learner_1";

    async function syncProgressWithFirebase() {
        document.getElementById('dbMsg').innerText = "Synkroniserer fremdrift...";
        const storageKey = `mastered_${currentMode}_${activeLevel}`;
        
        if (db) {
            const userRef = doc(db, "users", userId);
            try {
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    masteredList = data[storageKey] || [];
                } else {
                    await setDoc(userRef, { [storageKey]: [] }, { merge: true });
                    masteredList = [];
                }
                document.getElementById('dbMsg').innerText = "Sky-synkronisering aktiv.";
                setupSession();
                return;
            } catch (e) { console.log("Firebase fallback to local."); }
        }
        
        document.getElementById('dbMsg').innerText = "Frakoblet modus (Lokal lagring).";
        masteredList = JSON.parse(localStorage.getItem(`local_${storageKey}`)) || [];
        setupSession();
    }

    function setupSession() {
        const fullLevelList = masterData[currentMode][activeLevel] || [];
        sessionList = fullLevelList.filter(item => !masteredList.includes(item.no));
        sessionList.sort(() => Math.random() - 0.5);
        idx = 0;
        render();
    }

    function render() {
        const fullCount = (masterData[currentMode][activeLevel] || []).length;
        const remaining = sessionList.length;
        const doneCount = fullCount - remaining;
        const pct = fullCount > 0 ? Math.round((doneCount / fullCount) * 100) : 0;

        document.getElementById("statProgress").innerText = `Mestret: ${doneCount}/${fullCount}`;
        document.getElementById("statPercent").innerText = `${pct}%`;
        document.getElementById("barFill").style.width = `${pct}%`;

        if (sessionList.length === 0) {
            document.getElementById("boxNor").innerText = "Ferdig med denne delen! 🎉";
            document.getElementById("boxPron").innerText = "-";
            document.getElementById("boxEng").innerText = `Nivå ${activeLevel} er fullført!`;
            document.getElementById("boxTag").innerText = "Suksess";
            document.getElementById("boxDivider").style.display = "block";
            document.getElementById("boxTranslation").style.display = "block";
            document.getElementById("boxHint").style.display = "none";
            document.getElementById("boxMuntligTip").classList.add("hidden");
            return;
        }

        flipped = false;
        const item = sessionList[idx];
        document.getElementById("boxNor").innerText = item.no;
        document.getElementById("boxPron").innerText = item.pron || "";
        document.getElementById("boxEng").innerText = item.en;
        document.getElementById("boxSNor").innerText = item.s_no || "";
        document.getElementById("boxSEng").innerText = item.s_en || "";
        document.getElementById("boxTag").innerText = item.tag || "Vokabular";
        
        if(item.tip) {
            document.getElementById("boxMuntligTip").innerText = item.tip;
            document.getElementById("boxMuntligTip").classList.remove("hidden");
        } else {
            document.getElementById("boxMuntligTip").classList.add("hidden");
        }

        document.getElementById("boxDivider").style.display = "none";
        document.getElementById("boxTranslation").style.display = "none";
        document.getElementById("boxHint").innerText = "TRYKK PÅ KORTET FOR Å SE SVAR";
        document.getElementById("boxHint").style.display = "block";
    }
    
    window.flip = function(event) {
        if (event.target.classList.contains('audio-btn')) return;
        if (sessionList.length === 0) return;
        flipped = !flipped;
        const displayState = flipped ? "block" : "none";
        document.getElementById("boxDivider").style.display = displayState;
        document.getElementById("boxTranslation").style.display = displayState;
    };

    window.speakCurrentWord = function(event) {
        event.stopPropagation();
        if (sessionList.length === 0) return;
        // Clean prefixes for natural text-to-speech
        const cleanText = sessionList[idx].no.replace(/^å\s+/, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'no-NO';
        window.speechSynthesis.speak(utterance);
    };

    window.handleCard = async function(known) {
        if (sessionList.length === 0) return;
        if (known) {
            const wordWord = sessionList[idx].no;
            masteredList.push(wordWord);
            const storageKey = `mastered_${currentMode}_${activeLevel}`;
            localStorage.setItem(`local_${storageKey}`, JSON.stringify(masteredList));
            
            if (db) {
                try {
                    const userRef = doc(db, "users", userId);
                    await updateDoc(userRef, { [storageKey]: arrayUnion(wordWord) });
                } catch(e) { console.log("Lagret lokalt midlertidig."); }
            }
            sessionList.splice(idx, 1);
        } else {
            idx++;
        }
        if (idx >= sessionList.length) idx = 0;
        render();
    };

    window.switchMode = function(mode) {
        currentMode = mode;
        document.getElementById("tabGloser").classList.toggle("active", mode === "gloser");
        document.getElementById("tabMuntlig").classList.toggle("active", mode === "muntlig");
        syncProgressWithFirebase();
    };

    window.switchLevel = function() {
        activeLevel = document.getElementById("levelPicker").value;
        syncProgressWithFirebase();
    };

    window.switchUser = function() {
        userId = document.getElementById("userIdInput").value;
        syncProgressWithFirebase();
    };

    // Run init
    syncProgressWithFirebase();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("SW registrert."));
    }
</script>
</body>
</html>
